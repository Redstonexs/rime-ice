# 雾凇拼音 · 输入预测补丁示例（librime-predict）
#
# 作用：输入区为空时，根据「上一个上屏的词」预测下一段文字，可直接选用而无需输入。
#
# 用法（详见 others/docs/Prediction.md）：
#   1. 确认所用前端内置了 librime-predict 插件（Weasel / fcitx5 / Trime 等，见教程）。
#   2. 把 predict.db 放到 Rime 用户文件夹。
#   3. 把本文件复制到用户文件夹并命名为 rime_ice.custom.yaml（若已有同名文件，把
#      patch: 下的条目合并进去）。
#   4. 重新部署。F4 菜单里会出现「预测」开关。
#
# 双拼用户：请改为 patch 你正在用的方案，例如新建 double_pinyin_flypy.custom.yaml，
#          内容与本文件 patch: 部分相同。

patch:
  # 1) 挂载预测处理器（放在 key_binder 之前）与预测翻译器（放在最前）
  "engine/processors/@after 0": predictor
  "engine/translators/@before 0": predict_translator

  # 2) 增加「预测」开关；reset: 1 表示部署后默认开启，删掉该行则默认关闭
  "switches/+":
    - name: prediction
      states: [ 关闭预测, 开启预测 ]
      reset: 1

  # 3) 预测器参数
  predictor:
    db: predict.db      # 预测库文件名（位于用户文件夹 / 共享文件夹）
    max_candidates: 5   # 每次最多显示的预测候选数；设为与 menu/page_size 一致可避免句号触发翻页
    max_iterations: 2   # 连续预测的最大次数；0 表示不限制

  # ─────────────────────────────────────────────────────────────────────────
  # 备选后端：librime-predict-leveldb（按上屏历史学习，越用越准）
  #   https://github.com/fxliang/librime-predict-leveldb
  # 与上面的原版 librime-predict【二选一】：组件同名（predictor / predict_translator），
  # 不能同时启用。需前端的 librime 在编译时带了该插件（目前发行版自带的通常是原版）。
  # 用法：注释/删除上面的 predictor 块，改用下面这套（详见 others/docs/Prediction.md 第七节）：
  #
  #   predictor:
  #     predictdb: predict.userdb         # LevelDB 用户库（首次部署自动创建于用户目录）
  #     max_candidates: 5
  #     max_iterations: 1                 # 连续预测次数；0 表示不限制
  #     max_commit_interval_seconds: 30   # 两次上屏间隔超过该秒数则不建立关联
  #     legacy_mode: false                # true 则退回原版、改读下面的静态 db
  #     db: predict.db                    # 仅 legacy_mode: true 时使用
